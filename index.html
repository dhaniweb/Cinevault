<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineVault — Katalog Film</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --border: #2a2a3a;
      --accent: #e63946; --accent2: #ff6b6b; --gold: #ffd60a;
      --text: #f0f0f5; --muted: #7a7a9a; --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 20px rgba(230,57,70,0.5); }
    .logo span { color: var(--text); }
    .search-wrap { position: relative; flex: 1; max-width: 320px; margin: 0 12px; }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 8px 16px 8px 38px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }

    .hero {
      position: relative; background: linear-gradient(135deg, #1a0a0f 0%, #0a0a1f 50%, #0f0a1a 100%);
      padding: 48px 16px 56px; overflow: hidden; text-align: center;
    }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(230,57,70,0.12) 0%, transparent 70%); }
    .hero-tag { display: inline-block; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.4); color: var(--accent2); font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(38px, 8vw, 64px); letter-spacing: 3px; line-height: 1; margin-bottom: 12px; }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--muted); font-size: 14px; max-width: 300px; margin: 0 auto; line-height: 1.6; }

    .genre-section { padding: 20px 16px 8px; }
    .genre-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .genre-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .pill:hover, .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .section { padding: 24px 16px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; display: inline-block; width: 4px; height: 22px; background: var(--accent); border-radius: 2px; }
    .see-all { color: var(--accent); font-size: 13px; cursor: pointer; text-decoration: none; font-weight: 500; }

    .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; border: 1px solid var(--border); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); border-color: var(--accent); }
    .card-img-placeholder { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, var(--surface) 0%, var(--card) 100%); display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .card-badge { position: absolute; top: 8px; left: 8px; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; }
    .card-rating { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); color: var(--gold); font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 4px; }
    .card-info { padding: 10px 8px; }
    .card-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
    .card-meta span { color: var(--border); }

    /* VIDEO MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); overflow-y: auto; padding: 16px; }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
    .video-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }
    .modal-close { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; z-index: 10; }

    .modal-body { padding: 16px; }
    .modal-genre-tag { display: inline-block; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3); color: var(--accent2); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 8px; }
    .modal-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .modal-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
    .stars { color: var(--gold); font-size: 16px; letter-spacing: 1px; }
    .rating-num { font-size: 18px; font-weight: 700; }
    .rating-total { color: var(--muted); font-size: 12px; }
    .modal-desc { font-size: 13px; color: #b0b0c8; line-height: 1.7; margin-bottom: 16px; }
    .modal-note { font-size: 11px; color: var(--muted); background: var(--surface); border-radius: 8px; padding: 8px 12px; }

    .no-results { text-align: center; padding: 40px 16px; color: var(--muted); }
    .no-results .icon { font-size: 40px; margin-bottom: 12px; }

    footer { text-align: center; padding: 24px 16px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px; }
    footer span { color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <div class="logo">Cine<span>Vault</span></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Cari film..."/>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">✦ Katalog Film Terlengkap</div>
  <h1>Temukan Film <span>Favoritmu</span></h1>
  <p>Ribuan judul film dari berbagai genre tersedia untukmu.</p>
</div>

<div class="genre-section">
  <div class="genre-label">Genre</div>
  <div class="genre-pills" id="genrePills"></div>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title">Semua Film</div>
    <span class="see-all" id="resultCount">0 film</span>
  </div>
  <div class="movie-grid" id="movieGrid"></div>
  <div class="no-results" id="noResults" style="display:none;">
    <div class="icon">🎬</div>
    <div>Film tidak ditemukan</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<footer>© 2025 <span>CineVault</span> — Katalog Film Indonesia</footer>

<script>
  const MOVIES = [
    { id:1,  title:"Avengers: Endgame",     year:2019, genre:"Action",  rating:8.4, duration:"181 mnt", emoji:"🦸", badge:"Box Office", youtube:"TcMBFSGVi1c", poster:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg", desc:"Setelah kejadian dahsyat Thanos, para Avengers berkumpul kembali untuk membalikkan keadaan dan menyelamatkan semesta." },
    { id:2,  title:"Inception",             year:2010, genre:"Sci-Fi",  rating:8.8, duration:"148 mnt", emoji:"🌀", badge:"Klasik",    youtube:"YoHD9XEInc0", poster:"https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg", desc:"Seorang pencuri yang mampu memasuki mimpi orang lain diberi tugas menanamkan ide ke dalam pikiran target." },
    { id:3,  title:"Parasite",              year:2019, genre:"Thriller",rating:8.5, duration:"132 mnt", emoji:"🪲", badge:"Oscar",     youtube:"5xH0HfJHsaY", poster:"https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg", desc:"Keluarga miskin secara perlahan menyusup ke kehidupan keluarga kaya dengan cara yang cerdas namun berbahaya." },
    { id:4,  title:"Interstellar",          year:2014, genre:"Sci-Fi",  rating:8.6, duration:"169 mnt", emoji:"🚀", badge:"Epik",      youtube:"zSWdZVtXT7E", poster:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg", desc:"Seorang astronot melakukan perjalanan luar angkasa melewati lubang cacing demi menemukan rumah baru bagi manusia." },
    { id:5,  title:"The Dark Knight",       year:2008, genre:"Action",  rating:9.0, duration:"152 mnt", emoji:"🦇", badge:"Legenda",   youtube:"EXeTwQWrcwY", poster:"https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", desc:"Batman menghadapi ancaman terbesar dari Joker yang bersumpah menenggelamkan Gotham City dalam kekacauan." },
    { id:6,  title:"Get Out",               year:2017, genre:"Horror",  rating:7.7, duration:"104 mnt", emoji:"😱", badge:"Horor",     youtube:"DzfpyUB60a4", poster:"https://image.tmdb.org/t/p/w500/tFXcEccSUMyeZa9ud6az0qFqvsD.jpg", desc:"Seorang pemuda menemukan rahasia gelap keluarga kekasihnya yang tinggal di lingkungan serba putih." },
    { id:7,  title:"Spirited Away",         year:2001, genre:"Animasi", rating:8.6, duration:"125 mnt", emoji:"🐉", badge:"Animasi",   youtube:"ByXuk9QqQkk", poster:"https://image.tmdb.org/t/p/w500/39wmItIWsg5sZMyRUHLkWBcuVCM.jpg", desc:"Seorang gadis kecil tersesat di dunia roh dan harus bekerja di pemandian ajaib untuk menyelamatkan orang tuanya." },
    { id:8,  title:"Dune",                  year:2021, genre:"Sci-Fi",  rating:8.0, duration:"155 mnt", emoji:"🏜️", badge:"Epik",     youtube:"8g18jFqu3cE", poster:"https://image.tmdb.org/t/p/w500/d5NXSklXo0qyIYkgV94XAgMIckC.jpg", desc:"Seorang pemuda berbakat pergi ke planet gurun paling berbahaya di semesta untuk menjaga masa depan keluarganya." },
    { id:9,  title:"Death Note", year:2006, genre:"Thriller", rating:7.9, duration:"126 mnt", emoji:"📓", badge:"Jepang", youtube:"NlJZ-YgAt-c", poster:"https://image.tmdb.org/t/p/w500/iWpAEjQMHvMWqzQ5PSwyvgKFVtH.jpg", desc:"Light Yagami menemukan buku misterius Death Note yang memberinya kekuatan untuk membunuh siapapun hanya dengan menuliskan nama mereka." },
    { id:10, title:"Everything Everywhere", year:2022, genre:"Sci-Fi",  rating:7.8, duration:"139 mnt", emoji:"🌌", badge:"Viral",     youtube:"wxN1T1uxQ2g", poster:"https://image.tmdb.org/t/p/w500/w3LxiVYdWWRvEVdn5RYq6jIqkb1.jpg", desc:"Seorang ibu menjelajahi multiverse untuk menyelamatkan dunia sambil menghadapi konflik keluarganya." },
    { id:11, title:"Oppenheimer",           year:2023, genre:"Drama",   rating:8.3, duration:"180 mnt", emoji:"💥", badge:"Oscar",     youtube:"uYPbbksJxIg", poster:"https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg", desc:"Kisah nyata ilmuwan jenius di balik penciptaan bom atom yang mengubah arah perang dunia kedua selamanya." },
    { id:12, title:"Death Note 2: The Last Name", year:2006, genre:"Thriller", rating:7.8, duration:"139 mnt", emoji:"📓", badge:"Jepang", youtube:"YHuHl1GEkTU", poster:"https://image.tmdb.org/t/p/w500/q0bjPIoAFhAXGHkCqBMkAj8zqnZ.jpg", desc:"Light Yagami sebagai Kira menghadapi ancaman baru dari Near dan Mello yang bersumpah mengungkap identitas aslinya." },
  ];

  const GENRES = ["Semua", ...new Set(MOVIES.map(m => m.genre))];
  let activeGenre = "Semua", searchQuery = "";

  const pillsEl = document.getElementById('genrePills');
  GENRES.forEach(g => {
    const el = document.createElement('div');
    el.className = 'pill' + (g === 'Semua' ? ' active' : '');
    el.textContent = g;
    el.onclick = () => {
      activeGenre = g;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      renderMovies();
    };
    pillsEl.appendChild(el);
  });

  function renderMovies() {
    const grid = document.getElementById('movieGrid');
    const noRes = document.getElementById('noResults');
    const count = document.getElementById('resultCount');
    let filtered = MOVIES.filter(m => {
      const matchGenre = activeGenre === 'Semua' || m.genre === activeGenre;
      const matchSearch = m.title.toLowerCase().includes(searchQuery.toLowerCase());
      return matchGenre && matchSearch;
    });
    count.textContent = filtered.length + ' film';
    grid.innerHTML = '';
    if (filtered.length === 0) { noRes.style.display = 'block'; return; }
    noRes.style.display = 'none';
    filtered.forEach(m => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img class="card-img" src="${m.poster}" alt="${m.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="card-img-placeholder" style="display:none">${m.emoji}</div>
        ${m.badge ? `<div class="card-badge">${m.badge}</div>` : ''}
        <div class="card-rating">⭐ ${m.rating}</div>
        <div class="card-info">
          <div class="card-title">${m.title}</div>
          <div class="card-meta">${m.year} <span>•</span> ${m.genre}</div>
        </div>
      `;
      card.onclick = () => openModal(m);
      grid.appendChild(card);
    });
  }

  function getStars(r) {
    const full = Math.round(r / 2);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function openModal(m) {
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/${m.youtube}?autoplay=1" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-genre-tag">${m.genre}</div>
        <div class="modal-title">${m.title}</div>
        <div class="modal-meta">
          <span>📅 ${m.year}</span>
          <span>⏱ ${m.duration}</span>
          ${m.badge ? `<span>🏷 ${m.badge}</span>` : ''}
        </div>
        <div class="modal-rating">
          <span class="stars">${getStars(m.rating)}</span>
          <span class="rating-num">${m.rating}</span>
          <span class="rating-total">/ 10</span>
        </div>
        <div class="modal-desc">${m.desc}</div>
        <div class="modal-note">📺 Video di atas adalah trailer resmi dari YouTube.</div>
      </div>
    `;
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('modalContent').innerHTML = '';
    document.body.style.overflow = '';
  }

  document.getElementById('modalOverlay').onclick = function(e) {
    if (e.target === this) closeModal();
  };

  document.getElementById('searchInput').oninput = function() {
    searchQuery = this.value;
    renderMovies();
  };

  renderMovies();
</script>
</body>
</html>
